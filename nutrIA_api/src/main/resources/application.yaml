spring:
  application:
    name: nutria-api
  datasource:
    url: jdbc:postgresql://localhost:5432/nutria_db
    username: postgres
    password: adminadmin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080